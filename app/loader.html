<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kidev's TCOAAL Browser Loader</title>
    <link rel="icon" id="favicon" href="/favicon.ico" type="image/x-icon" />
    <style>
      :root {
        --green: #86d37a;
        --purple: #ec83c3;
        --blue: #596891;
        --yellow: #eeea72;
        --grey: #5b5b5b;
        --default: #d3d0c0;
        --red: #955456;
        --white: #ffffff;
        --black: #000000;
        --bg-color: #1a1a1a;
        --bg-color-darker: #121212;
        --bg-color-section: #2a2a2a;
        --bg-color-section-lighter: #3a3a3a;
        --txt-color: var(--white);
        --accent-color: #555555;
        --accent-color-light: #666666;
        --play-glow-color: var(--purple);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--black);
        color: var(--default);
        font-family: "Georgia", serif;
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
      }

      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        background: var(--black);
        background-image: url("img/bg.webp");
        background-repeat: no-repeat;
        background-position: top center;
        background-attachment: local;
        background-size: cover;
        z-index: 1;
      }

      /* Pulsing purple halo */
      .overlay::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          circle,
          rgba(128, 0, 255, 0.25) 0,
          rgba(128, 0, 255, 0.05) 40%,
          rgba(0, 0, 0, 0) 80%
        );
        background-repeat: no-repeat;
        background-size: 200% 200%;
        background-position: 50% 85%;
        animation: haloPulse 4s ease-in-out infinite;
      }

      @keyframes haloPulse {
        0% {
          opacity: 0.3;
          transform: scale(1);
        }
        50% {
          opacity: 0.6;
          transform: scale(1.1);
        }
        100% {
          opacity: 0.3;
          transform: scale(1);
        }
      }

      /* GitHub link (top-right) */
      .github-link {
        position: absolute;
        top: 0;
        right: 0;
        z-index: 10;
        color: rgba(255, 255, 255, 0.9);
        text-decoration: none;
        transition: all 0.3s ease;
        padding: 8px 12px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(15, 15, 15, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 0.8em;
        font-family: "Georgia", serif;
      }

      .github-link:hover,
      .tool-link:hover {
        color: var(--white);
        background: rgba(74, 144, 226, 0.15);
        border-color: rgba(74, 144, 226, 0.3);
        transform: translateY(-1px);
      }

      .tool-link {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 10;
        color: rgba(255, 255, 255, 0.9);
        text-decoration: none;
        transition: all 0.3s ease;
        padding: 8px 12px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(15, 15, 15, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 0.8em;
        font-family: "Georgia", serif;
      }

      .tool-link:hover {
        background: rgba(236, 131, 195, 0.15);
        border-color: rgba(236, 131, 195, 0.3);
      }

      .tool-link .tool-icon {
        width: 16px;
        height: 16px;
        fill: currentColor;
      }

      .github-link .github-icon {
        width: 16px;
        height: 16px;
        fill: currentColor;
      }

      /* Central content */
      .content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2vmax;
        padding: 3vmax;
        /* Reserve space at the bottom for the absolutely-positioned
           bottom-note so a tall error panel can scroll without colliding
           with the steam widget. */
        padding-bottom: 220px;
        text-align: center;
        min-height: 100vh;
        justify-content: center;
        position: relative;
        overflow-y: auto;
      }

      .content h1 {
        color: var(--txt-color);
        font-size: 2vmax;
        font-weight: normal;
        letter-spacing: 0.05em;
        margin: 0;
      }

      .content .subtitle {
        font-size: 1vmax;
        color: var(--default);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-top: -1vmax;
      }

      .content .info {
        font-size: 0.9vmax;
        line-height: 1.65;
        max-width: 500px;
      }

      /* Hidden file input */
      #file-input {
        display: none;
      }

      /* Buttons (composition-btn style) */
      .action-btn {
        background: var(--accent-color-light);
        color: var(--txt-color);
        border: none;
        border-radius: 4px;
        padding: 0.8vmax 2vmax;
        cursor: pointer;
        font-size: 1.8vmax;
        font-family: "Georgia", serif;
        font-weight: bold;
        transition: all 0.2s;
        white-space: nowrap;
        position: relative;
      }

      .action-btn:hover:not(:disabled) {
        background: var(--accent-color);
      }

      .action-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      .action-btn.secondary {
        font-size: 1.2vmax;
        padding: 0.5vmax 1.5vmax;
        background: var(--bg-color-section);
      }

      .action-btn.secondary:hover:not(:disabled) {
        background: var(--bg-color-section-lighter);
      }

      .progress-wrap {
        display: none;
        width: 90%;
        max-width: 500px;
      }

      .progress-wrap.visible {
        display: block;
      }

      .bar-track {
        width: 100%;
        height: 2vmax;
        background: var(--bg-color-section-lighter);
        border-radius: 1vmax;
        overflow: hidden;
        margin-bottom: 1vmax;
        border: 2px solid var(--black);
        position: relative;
      }

      .bar-fill {
        height: 100%;
        background: var(--white);
        width: 0;
        transition: width 0.3s ease;
        border: 2px solid var(--black);
        box-sizing: border-box;
        border-radius: 0.8vmax;
      }

      .status {
        text-align: center;
        color: var(--txt-color);
        font-size: 0.9vmax;
        min-height: 1.2em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .status.error {
        color: var(--red);
      }
      .status.ok {
        color: var(--green);
      }

      .error-panel {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 1.2vmax;
        max-width: 540px;
        margin-top: 1.5vmax;
        padding: 1.5vmax 2vmax;
        background: #1a0d0e;
        border: 1px solid rgba(149, 84, 86, 0.7);
        border-radius: 6px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6);
      }
      .error-panel.visible {
        display: flex;
      }
      .error-panel h2 {
        color: var(--red);
        font-size: 1.3vmax;
        font-weight: normal;
        margin: 0;
      }
      .error-panel .error-body {
        color: rgba(255, 255, 255, 0.8);
        font-size: 0.95vmax;
        line-height: 1.5;
        text-align: center;
      }
      .error-panel .error-detail {
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 0.8vmax;
        color: #c8a;
        background: rgba(0, 0, 0, 0.3);
        padding: 0.6vmax 0.8vmax;
        border-radius: 4px;
        max-width: 100%;
        word-break: break-word;
      }
      .error-panel .error-actions {
        display: flex;
        gap: 1vmax;
        flex-wrap: wrap;
        justify-content: center;
      }

      /* Bottom note + Steam widget */
      .bottom-note {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        margin: 0;
        line-height: 1;
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        font-style: italic;
        z-index: 5;
      }

      #steam-buy-frame {
        border: 0;
        z-index: 100;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="overlay">

      <div class="content">
        <!--
        <h1>The Coffin of Andy and Leyley</h1>
        <div class="subtitle">Browser Loader</div>
        -->

        <input type="file" id="file-input" webkitdirectory hidden />

        <button class="action-btn" id="btn-load" onclick="loadGameFiles()">
          Import Game
        </button>

        <div class="progress-wrap" id="progress-wrap">
          <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
          <div class="status" id="status">Preparing...</div>
        </div>

        <div class="error-panel" id="error-panel">
          <h2 id="error-title">Import problem</h2>
          <div class="error-body" id="error-body"></div>

          <div class="error-actions">
            <button
              class="action-btn secondary"

              Clear data &amp; try again

    <script>
      "use strict";

      // IndexedDB helpers

      var DB_NAME = "tcoaal";
      var DB_VERSION = 1;
      var STORE_NAME = "assets";

      // CLD constants are referenced by REQUIRED_FILES below, so they have
      // to be initialised before that array is built. (`var` hoists the
      // declaration but not the assignment, so order still matters.)
      var TCOAAL_SIG = [84, 67, 79, 65, 65, 76]; // "TCOAAL"
      var CLD_IDB_KEY = "data/9c7050ae76645487";
      var LANG_DATA_CACHE_KEY = "__lang_data__";

      function openDB() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(DB_NAME, DB_VERSION);
          req.onupgradeneeded = (e) =>
            e.target.result.createObjectStore(STORE_NAME);
          req.onsuccess = (e) => resolve(e.target.result);
          req.onerror = (e) => reject(e.target.error);
        });
      }

      function putAsset(db, key, buffer) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, "readwrite");
          const req = tx.objectStore(STORE_NAME).put(buffer, key);
          req.onsuccess = resolve;
          req.onerror = (e) => reject(e.target.error);
        });
      }

      /** Returns true if the store contains at least one entry. */
      function hasAnyAsset(db) {
        return new Promise((resolve) => {
          const req = db
            .transaction(STORE_NAME, "readonly")
            .objectStore(STORE_NAME)
            .count();
          req.onsuccess = () => resolve(req.result > 0);
          req.onerror = () => resolve(false);
        });
      }

      // File-processing pipeline

      // Files we require to be present after a successful import. If any
      // are missing the user almost certainly picked the wrong directory
      // (the game's parent folder rather than its `www`, or an old build
      // missing the encrypted CLD).
      var REQUIRED_FILES = [
        "js/rpg_core.js",
        "js/plugins.js",
        CLD_IDB_KEY, // data/9c7050ae76645487 (encrypted language data)
      ];
      var REQUIRED_LABELS = {
        "js/rpg_core.js": "RPG Maker engine (js/rpg_core.js)",
        "js/plugins.js": "plugin registry (js/plugins.js)",
        [CLD_IDB_KEY]: "language data (data/9c7050ae76645487)",
      };

      /**
       * Store an array of {path, getBuffer} descriptors into IndexedDB.
       * getBuffer is an async function that returns an ArrayBuffer.
       *
       * Returns true on success, false (with error UI shown) on failure.
       */
      async function storeFiles(entries) {
        let db;
        try {
          db = await openDB();
        } catch (err) {
          showError(
            "Browser storage unavailable",
            "Couldn't open IndexedDB. Private browsing or " +
              "blocked storage will prevent the game from loading.",
            err.message,
          );
          $load.disabled = false;
          return false;
        }

        const total = entries.length;
        if (total === 0) {
          showError(
            "Nothing to import",
            "No files were selected. Pick the game's folder " +
              "(the one named after the game, or its `www` " +
              "subfolder).",
          );
          $load.disabled = false;
          return false;
        }
        setStatus(`Loading 0 / ${total} files...`);
        setProgress(0, total);

        // Read with retry. iOS Safari and Android Chrome can throw
        // transient OOM/IO errors mid-batch on File.arrayBuffer() when
        // many files are read in quick succession. A short delay and a
        // retry attempt almost always succeeds: the alternative is a
        // silently incomplete IDB (file in the picker, not in IDB) that
        // surfaces later as a "HTTP 404" from the SW for a single file.
        async function readWithRetry(getBuffer, attempts) {
          let lastErr = null;
          for (let i = 0; i < attempts; i++) {
            try {
              return await getBuffer();
            } catch (err) {
              lastErr = err;
              await new Promise((r) => setTimeout(r, 50 * (i + 1)));
            }
          }
          throw lastErr;
        }

        let done = 0;
        const skipped = [];
        for (const { path: filePath, getBuffer } of entries) {
          try {
            const buffer = await readWithRetry(getBuffer, 3);
            await putAsset(db, filePath, buffer);
          } catch (err) {
            skipped.push(filePath);
            console.warn("[loader] Skipping", filePath, err);
          }
          done++;
          setProgress(done, total);
          if (done % 20 === 0 || done === total) {
            setStatus(`Loading ${done} / ${total} files...`);
          }
        }

        // Validate required files made it into IDB. A user who picked
        // the wrong directory will still see "Loading X / Y" succeed but
        // the game will boot into a broken state. Catch it now.
        setStatus("Validating import...", "ok");
        const missing = [];
        for (const key of REQUIRED_FILES) {
          const present = await getAsset(db, key);
          if (!present) missing.push(key);
        }
        if (missing.length > 0) {
          const labels = missing
            .map((k) => "  - " + (REQUIRED_LABELS[k] || k))
            .join("\n");
          showError(
            "Required files missing",
            "Some files the game needs to start weren't found in the " +
              "folder you selected. Make sure you pick the game's folder " +
              "(the one named after the game) or its `www` subfolder.",
            "Missing:\n" + labels,
          );
          $load.disabled = false;
          return false;
        }

        // Surface non-required skipped files. They're not fatal, but the
        // user should know an incomplete import landed in IDB so they can
        // re-import if a needed plugin/asset went missing. Common cause
        // on mobile: transient memory pressure during File.arrayBuffer().
        if (skipped.length > 0) {
          const preview = skipped
            .slice(0, 5)
            .map((p) => "  - " + p)
            .join("\n");
          const more =
            skipped.length > 5
              ? "\n  ... and " + (skipped.length - 5) + " more"
              : "";
          console.warn(
            "[loader] " +
              skipped.length +
              " file(s) skipped during import:\n" +
              preview +
              more,
          );
        }

        setStatus(`${total} files stored. Extracting language data...`, "ok");
        const langOk = await extractLangData(db);
        if (!langOk) {
          showError(
            "Language data couldn't be extracted",
            "The CLD file was found but couldn't be decoded. The import " +
              "is incomplete. Clear and try again.",
          );
          $load.disabled = false;
          return false;
        }
        setStatus("Registering service worker...", "ok");
        await registerSW();
        setStatus("Ready! Launching game...", "ok");
        const fav = document.getElementById("favicon");
        fav.href = "icon/icon.png";
        fav.type = "image/png";
        setTimeout(() => {
          window.location.href = "/index.html";
        }, 600);
        return true;
      }

      // CLD (Compiled Language Data) extraction
      //
      // The CLD is an encrypted game file at data/9c7050ae76645487.
      // Format: TCOAAL(6) + keyByte(1) + encrypted payload -> LANGDATA(8) + JSON
      // We decrypt it during import and store the plain JSON as '__lang_data__'
      // so the SW and lang-shim.js can serve it without runtime decryption.

      // (TCOAAL_SIG / CLD_IDB_KEY / LANG_DATA_CACHE_KEY are declared at
      // the top of this script so REQUIRED_FILES can see them.)

      function cldFileMask(hashedRelPath) {
        const fname = hashedRelPath.split("/").pop().toUpperCase();
        let m = 0;
        for (let i = 0; i < fname.length; i++)
          m = (m << 1) ^ fname.charCodeAt(i);
        return m;
      }

      /**
       * Decrypt a TCOAAL-encrypted buffer. Returns the decrypted payload (without
       * the 7-byte TCOAAL header). If the buffer doesn't start with the TCOAAL
       * signature, returns the ORIGINAL bytes unchanged (mirrors server.js dekit).
       */
      function cldDekit(arrayBuffer) {
        const bytes = new Uint8Array(arrayBuffer);
        // Check for TCOAAL signature
        if (bytes.length < TCOAAL_SIG.length + 1) return bytes;
        let isTcoaal = true;
        for (let i = 0; i < TCOAAL_SIG.length; i++) {
          if (bytes[i] !== TCOAAL_SIG[i]) {
            isTcoaal = false;
            break;
          }
        }
        if (!isTcoaal) return bytes; // not encrypted return as-is

        let keyByte = bytes[TCOAAL_SIG.length];
        const payload = bytes.subarray(TCOAAL_SIG.length + 1);
        let mask = (cldFileMask(CLD_IDB_KEY) + 1) & 0xff;
        if (keyByte === 0) keyByte = payload.length;

        const out = new Uint8Array(payload.length);
        for (let j = 0; j < payload.length; j++) {
          if (j < keyByte) {
            const b = payload[j];
            out[j] = b ^ mask;
            mask = ((mask << 1) ^ b) & 0xff;
          } else {
            out[j] = payload[j];
          }
        }
        return out;
      }

      function getAsset(db, key) {
        return new Promise((resolve) => {
          const tx = db.transaction(STORE_NAME, "readonly");
          const req = tx.objectStore(STORE_NAME).get(key);
          req.onsuccess = () => resolve(req.result ?? null);
          req.onerror = () => resolve(null);
        });
      }

      // Extract & cache the plain CLD JSON. Returns true on success,
      // false on any decode/parse failure (so the caller can surface a
      // clear "import incomplete" error).
      async function extractLangData(db) {
        const raw = await getAsset(db, CLD_IDB_KEY);
        if (!raw) {
          console.warn(
            "[loader] CLD file (" +
              CLD_IDB_KEY +
              ") not found in imported data",
          );
          return false;
        }

        // Normalize to ArrayBuffer (IDB may return typed array or Blob)
        let buf = raw;
        if (raw instanceof Blob) {
          buf = await raw.arrayBuffer();
        } else if (raw instanceof ArrayBuffer) {
          // good
        } else if (raw.buffer instanceof ArrayBuffer) {
          buf = raw.buffer;
        } else {
          console.warn("[loader] CLD: unexpected IDB type:", typeof raw);
          return false;
        }

        // Decrypt (no-op if not TCOAAL-encrypted)
        const decrypted = cldDekit(buf);
        if (!decrypted || decrypted.length < 9) {
          console.warn(
            "[loader] CLD too short (" +
              (decrypted ? decrypted.length : 0) +
              " bytes)",
          );
          return false;
        }
        const sig = new TextDecoder().decode(decrypted.slice(0, 8));
        if (sig !== "LANGDATA") {
          const hexPreview = Array.from(decrypted.slice(0, 16))
            .map((b) => b.toString(16).padStart(2, "0"))
            .join(" ");
          console.warn(
            '[loader] CLD header mismatch: expected LANGDATA, got "' +
              sig +
              '" (' +
              decrypted.length +
              " bytes, hex: " +
              hexPreview +
              ")",
          );
          return false;
        }
        const jsonStr = new TextDecoder().decode(decrypted.slice(8));
        // Validate JSON before storing
        try {
          JSON.parse(jsonStr);
        } catch (e) {
          console.warn("[loader] CLD JSON parse failed:", e);
          return false;
        }
        await putAsset(db, LANG_DATA_CACHE_KEY, jsonStr);
        return true;
      }

      // UI helpers
      // Declared with `var` so the inline onclick handlers (loadGameFiles,
      // dismissError) can reference them no matter where in the script
      // they're invoked from: `const` puts them in a temporal dead zone
      // until execution reaches this point.

      var $bar = document.getElementById("bar");
      var $status = document.getElementById("status");
      var $wrap = document.getElementById("progress-wrap");
      var $load = document.getElementById("btn-load");
      var $err = document.getElementById("error-panel");
      var $errTitle = document.getElementById("error-title");
      var $errBody = document.getElementById("error-body");
      var $errDetail = document.getElementById("error-detail");

      function showProgress(visible) {
        $wrap.classList.toggle("visible", visible);
      }

      function setProgress(done, total) {
        const pct = total > 0 ? Math.round((done / total) * 100) : 0;
        $bar.style.width = pct + "%";
      }

      function setStatus(text, cls) {
        $status.textContent = text;
        $status.className = "status" + (cls ? " " + cls : "");
      }

      function showError(title, body, detail) {
        $errTitle.textContent = title || "Import problem";
        $errBody.textContent = body || "";
        if (detail) {
          $errDetail.textContent = detail;
          $errDetail.style.display = "";
        } else {
          $errDetail.style.display = "none";
        }
        $err.classList.add("visible");
        showProgress(false);
        setStatus("");
      }

      function dismissError() {
        $err.classList.remove("visible");
        $load.disabled = false;
      }

      // Hard reset: drop everything we persisted and reload into the
      // base loader UI. Order matches index.html's __bootClearAndReload:
      // unregister SWs first so they release their IDB handle, then
      // wipe caches/localStorage, then delete the DBs (waiting for the
      // delete request to truly complete: onblocked means the SW is
      // still holding it).
      async function resetAndRetry() {
        const btn = $err.querySelector("button.action-btn");
        if (btn) {
          btn.disabled = true;
          btn.textContent = "Clearing...";
        }

        if ("serviceWorker" in navigator) {
          try {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map((r) => r.unregister()));
          } catch (e) {}
        }
        if ("caches" in self) {
          try {
            const keys = await caches.keys();
            await Promise.all(keys.map((k) => caches.delete(k)));
          } catch (e) {}
        }
        try {
          localStorage.clear();
        } catch (e) {}

        function dropDb(name) {
          return new Promise((resolve) => {
            function attempt(retries) {
              let settled = false;
              let req;
              try {
                req = indexedDB.deleteDatabase(name);
              } catch (e) {
                return resolve();
              }
              req.onsuccess = () => {
                settled = true;
                resolve();
              };
              req.onerror = () => {
                settled = true;
                resolve();
              };
              req.onblocked = () => {
                if (settled) return;
                if (retries > 0) {
                  settled = true;
                  setTimeout(() => attempt(retries - 1), 250);
                } else {
                  settled = true;
                  resolve();
                }
              };
            }
            attempt(2);
          });
        }
        await dropDb("tcoaal");
        await dropDb("tcoaal-saves");

        location.replace("/loader.html");
      }

      // Service Worker registration

      async function registerSW() {
        if (!("serviceWorker" in navigator)) return;
        try {
          const reg = await navigator.serviceWorker.register("/sw.js", {
            scope: "/",
          });
          // Force the browser to re-fetch sw.js and install any updated version
          // immediately (skipWaiting + clients.claim in the new SW ensure it
          // takes over before we redirect to index.html).
          await reg.update();
          // Wait for the (possibly new) SW to control this page.
          if (!navigator.serviceWorker.controller) {
            await new Promise((resolve) => {
              navigator.serviceWorker.addEventListener(
                "controllerchange",
                resolve,
                { once: true },
              );
            });
          }
        } catch (err) {
          console.warn("[loader] SW registration failed:", err);
        }
      }

      function loadGameFiles() {
        dismissError();
        document.getElementById("file-input").click();
      }

      /**
       * Handler for the hidden <input type="file" webkitdirectory> fallback.
       * webkitRelativePath looks like "www/data/be1a37535e921f91"; we strip the
       * leading directory component so keys match what the SW expects.
       */
      async function onFileInputChange(e) {
        const fileList = e.target.files;
        if (!fileList || fileList.length === 0) {
          showError(
            "No folder selected",
            "Pick the game's folder (the one named after the " +
              "game, or its `www` subfolder) to import.",
          );
          return;
        }

        $load.disabled = true;
        showProgress(true);
        setStatus("Preparing...");

        const entries = Array.from(fileList)
          .map((file) => {
            // Drop the top-level directory name chosen by the user.
            let relPath = file.webkitRelativePath.split("/").slice(1).join("/");
            // If user selected the game root, relPath starts with "www/"; strip it.
            if (relPath.startsWith("www/")) relPath = relPath.slice(4);
            return { path: relPath, getBuffer: () => file.arrayBuffer() };
          })
          .filter((e) => e.path); // discard empty paths

        try {
          await storeFiles(entries);
        } catch (err) {
          console.error("[loader] Import failed:", err);
          showError(
            "Import failed",
            "Something went wrong while importing. Try again, or " +
              "clear data and re-import.",
            err && err.message ? err.message : String(err),
          );
          $load.disabled = false;
        }
      }

      // Init: wire up file input + auto-redirect if files already loaded.
      // No "Play now" button: if files are present we go straight to the
      // game, no extra click needed. If something on the game page fails
      // it shows its own error UI with a "clear data" button.

      (async () => {
        document
          .getElementById("file-input")
          .addEventListener("change", onFileInputChange);

        let db;
        try {
          db = await openDB();
        } catch {
          // IDB unavailable (private browsing, locked storage). Show
          // import button anyway; the import attempt will surface a
          // proper error.
          return;
        }

        if (await hasAnyAsset(db)) {
          // Game files already imported -> straight to game.
          // index.html validates the import and shows its own
          // recovery UI if anything's wrong.
          location.replace("/index.html");
        }
      })();
    </script>
  </body>
</html>
