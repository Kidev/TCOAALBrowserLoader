<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Modding - TCOAAL Browser Player</title>
    <!--
      The modding screen was merged into loader.html and is now a hash route
      (loader.html#modding). This file is kept as a redirect so old bookmarks,
      the in-game menu, and the service worker's APP_SHELL entry keep working.
      Any tab hash (e.g. #create-project) is carried over verbatim; a bare
      modding.html lands on the Modding home tab.
    -->
    <script>
      (function () {
        var hash = location.hash || "#modding";
        location.replace("loader.html" + hash);
      })();
    </script>
    <meta http-equiv="refresh" content="0; url=loader.html#modding" />
  </head>
  <body>
    <p>
      Redirecting to <a href="loader.html#modding">the modding page</a>...
    </p>
  </body>
</html>
