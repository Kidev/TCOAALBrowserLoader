name: Deploy Desktop

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        app: [creator, user]
        os: [ubuntu-24.04, macos-26, windows-11]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Linux build deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libgtk-3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1

      - name: Cache cargo
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/desktop/target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('tools/desktop/**/Cargo.toml') }}

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20

      - name: Install Tauri CLI
        working-directory: tools/desktop/${{ matrix.app }}
        run: npm install

      - name: Bundle the Node runtime (this runner's node, matches the target OS)
        shell: bash
        run: |
          dest="tools/desktop/${{ matrix.app }}/src-tauri/runtime"
          mkdir -p "$dest"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "$(command -v node)" "$dest/node.exe"
          else
            cp "$(command -v node)" "$dest/node"
            chmod +x "$dest/node"
          fi
          node --version

      - name: Generate icons
        working-directory: tools/desktop/${{ matrix.app }}
        run: npx @tauri-apps/cli icon ../../../app/img/icon-512.png

      - name: Build
        working-directory: tools/desktop/${{ matrix.app }}
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          NO_STRIP: "true"
        run: npx @tauri-apps/cli build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tcoaal-${{ matrix.app }}-${{ matrix.os }}
          path: |
            tools/desktop/target/release/bundle/**/*.dmg
            tools/desktop/target/release/bundle/**/*.app
            tools/desktop/target/release/bundle/**/*.AppImage
            tools/desktop/target/release/bundle/**/*.deb
            tools/desktop/target/release/bundle/**/*.rpm
            tools/desktop/target/release/bundle/**/*.msi
            tools/desktop/target/release/bundle/**/*.exe
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download all build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist

      - name: Publish release and tag the build commit
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: desktop/v${{ inputs.version }}
          name: Desktop v${{ inputs.version }}
          target_commitish: ${{ github.sha }}
          files: dist/**/*
